name: clarityrms
description: "Retail Management System Flutter Application"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  flutter_bloc: ^9.1.1
  bloc: ^9.1.0
  equatable: ^2.0.7
  get_it: ^9.2.0
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  envied: ^1.3.2
  flutter_secure_storage: ^10.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.4
  json_annotation: ^4.9.0
  flutter_spinkit: ^5.2.2
  freezed_annotation: ^3.1.0
  flutter_gen_runner: ^5.12.0
  google_fonts: ^7.0.2
  shorebird_code_push: ^2.0.5
  toastification: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  envied_generator: ^1.3.2
  build_runner: ^2.10.4
  json_serializable: ^6.11.3
  freezed: ^3.2.4
  integration_test:
    sdk: flutter
  shelf: ^1.4.0
  http_parser: ^4.0.0
  shelf_router: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_gen:
  output: lib/shared/generated
