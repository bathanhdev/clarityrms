## GitHub Actions Node.js migration notes
#
# - We opt into Node.js 24 for JavaScript actions to test compatibility ahead of
#   the runner default switching to Node24. See:
#   https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# - To opt out and continue using Node20 temporarily (only supported until
#   the runner removes Node20), set `ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true`.
#
name: Flutter CI

env:
  # Force JS Actions to run on Node.js 24 (opt-in testing/compatibility)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # If you need to opt out later, set ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION to 'true'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "false"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"

      - name: Install dependencies
        run: flutter pub get

      - name: Write .env.dev from secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          USER_BASE_URL: ${{ secrets.USER_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          mkdir -p assets/env
          cat > assets/env/.env.dev <<EOF
          BASE_URL=$BASE_URL
          AUTH_BASE_URL=$AUTH_BASE_URL
          USER_BASE_URL=$USER_BASE_URL
          FIREBASE_API_KEY=$FIREBASE_API_KEY
          EOF

      - name: Write .env.prod from secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          USER_BASE_URL: ${{ secrets.USER_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          mkdir -p assets/env
          cat > assets/env/.env.prod <<EOF
          BASE_URL=$BASE_URL
          AUTH_BASE_URL=$AUTH_BASE_URL
          USER_BASE_URL=$USER_BASE_URL
          FIREBASE_API_KEY=$FIREBASE_API_KEY
          EOF

      - name: Write firebase_options.dart from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          cat > lib/firebase_options.dart <<EOF
          // File generated in CI from GitHub Secrets. Do not commit this file.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) {
                throw UnsupportedError(
                  'Firebase options have not been configured for web.',
                );
              }

              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                case TargetPlatform.macOS:
                case TargetPlatform.windows:
                case TargetPlatform.linux:
                  throw UnsupportedError(
                    'Firebase options are only configured for Android in CI.',
                  );
                default:
                  throw UnsupportedError(
                    'Firebase options are not supported for this platform.',
                  );
              }
            }

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: '$FIREBASE_API_KEY',
              appId: '$FIREBASE_APP_ID',
              messagingSenderId: '$FIREBASE_MESSAGING_SENDER_ID',
              projectId: '$FIREBASE_PROJECT_ID',
              storageBucket: '$FIREBASE_STORAGE_BUCKET',
            );
          }
          EOF

      - name: Codegen (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Check UI tokens (no hard-coded sizes/colors)
        run: dart tools/check_ui_tokens.dart

      - name: Run tests
        run: flutter test --coverage
