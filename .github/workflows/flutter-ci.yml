name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"

      - name: Install dependencies
        run: flutter pub get

      - name: Codegen (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Check UI tokens (no hard-coded sizes/colors)
        run: dart tools/check_ui_tokens.dart

      - name: Run tests
        run: flutter test --coverage
